<!DOCTYPE html>
<html>
    <head>
        <link rel = "stylesheet" href = "facebook-login.css">
        <title>Facebook login page</title>
    </head>
    <body>
        <div class = "page">
            <div class = "top">
                <p class = "facebook-logo">facebook</p>
                <p class = "facebook-description">Facebook helps you connect and share with the people in your life.</p>
            </div>
            <div class = "middle">
                <div class = "login-info">
                    <input class = "credentials" type = "text" placeholder = "Email address or phone number">
                    <input class = "credentials" type = "text" placeholder = "Password">
                    <button class = "login-button">Log in</button>
                    <p class = "forgottenpassword">Forgotten password?</p>
                </div>
                <button class = "createnewaccount">Create new account</button>
            </div>
            <div class = "bottom">
                <p class = "celebrity"><span class = "create">Create a Page</span> for a celebrity, brand or business</p>
            </div>
        </div>
    </body>
</html>
